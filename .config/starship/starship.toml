add_newline = false

format = """
$directory\
$git_branch\
${custom.jj}\
$git_status\
$terraform\
$kubernetes\
$line_break\
$character"""

[directory]
style = "bold cyan"
truncate_to_repo = false

[terraform]
format = "via [󱁢 $version]($style) "
style = "bold 105"

[kubernetes]
symbol = "󱄄 "
format = 'at [$symbol$context( \($namespace\))]($style) '
style = "bold blue"

[custom.jj]
description = "Display Jujutsu working copy status"
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "
