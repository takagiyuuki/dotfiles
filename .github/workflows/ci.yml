name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Lua Format
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check Nix Format
        run: nix-shell -p nixfmt --run "find . -name '*.nix' | xargs nixfmt --check"

  nix-build:
    name: Home Manager Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Home Manager
        run: |
          nix-channel --add https://github.com/nix-community/home-manager/archive/master.tar.gz home-manager
          nix-channel --update
          export NIX_PATH=$HOME/.nix-defexpr/channels:$NIX_PATH
          if [ -f "flake.nix" ]; then
            nix run nixpkgs#home-manager -- build --flake .
          else
            nix-shell -p home-manager --run "home-manager build"
          fi
